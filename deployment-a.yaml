apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: A
  template:
    metadata:
      labels:
        app: aceest
        version: A
    spec:
      containers:
        - name: aceest-container
          image: aceest-app:v1
          ports:
            - containerPort: 9000